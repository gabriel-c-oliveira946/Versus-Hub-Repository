<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/cadastro/css/cadastro.css">
    
    <link rel="icon" href="/image/logo.png" sizes="32x32"> 
    <title>VersusHub_Login</title>
</head>
<body>
    <!-- Criando o Header da Pagina-->
    <header class="barranav">
        <div class="logo">
        
           <a href="/pagina_inicial/index.html"> <img referrerpolicy="no-referrer" class="versusicon" src="/image/logo%20plus%20tipo%20textura.png" alt="Logo"> 

            </a>

            
        </div>

        <div class="menu_3_linha">

               

        </div>
    </header>

    <!-- Criando o Formulario da Aba Login -->
        <div class="container">
            <div class="form-box">
                <div class="avatar">
                    <img referrerpolicy="no-referrer" src="/image/boneco_logo_ofc.png" alt="avatar">
                    
                </div>
        
                <h2 id="cadastrop">Cadastro</h2>

                <form id="formCadastro">
    <input type="text" id="cadNome" placeholder="Nome de Usuário" required>
    <input type="date" id="cadNascimento">
    <input type="password" id="cadSenha" placeholder="Senha" required>
    <input type="email" id="cadEmail" placeholder="E-mail" required>

    <label class="checkbox-container">
        <input type="checkbox" id="cadAceite" required>
        Confirma direitos e restrições oferecida pela empresa.
    </label>

    <button type="submit" class="btn">Cadastrar</button>
</form>
        
                  <a id="cliquelogin" href="/login/login.html">Já possui uma conta? Faça Login</a>


            </div>
        </div>
<script src="/cadastro/js/script.js"></script>
</body>
</html>
